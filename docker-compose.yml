version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: manrs_observatory
      POSTGRES_USER: manrs
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manrs -d manrs_observatory"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://manrs:changeme@db:5432/manrs_observatory

  collector:
    build: ./backend
    command: python -m collector.main
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://manrs:changeme@db:5432/manrs_observatory

volumes:
  pgdata:
